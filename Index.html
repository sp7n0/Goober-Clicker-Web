<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goober Clicker</title>
  <link rel="stylesheet" href="Goober.css">
</head>

<body>
  <div class="goober-page">

    <div class="header-music-player">
      <div class="music play" id="musicControls">
        <img src="https://static.wikitide.net/gracewiki/8/8b/GooberIdle_Soulset.png"
          alt="the goober who dances" class="music-goob" id="randomizeMusicBtn">
      </div>
    </div>

    <div class="goober-container">
      <div class="flex-goober">

        <div class="goober">
          <h2>Goobers: <span id="points"></span></h2>
          <img id="gooberImg" src="Assets/Images/goob-default.png" alt="Goober" class="him" onclick="clickGoober()">
        </div>

        <div class="upgrades">
          <h3>Upgrades</h3>
          <div class="goob-upgrades">
            <div class="upgrade">
              <p>Goober Scaling! - <span id="scaleLevel"></span></p>
              <button onclick="upgradeScaling()" id="scaleCost"></button>
            </div>
            <div class="upgrade">
              <p>Goobers! - <span id="goobersLevel"></span></p>
              <button onclick="upgradeGoobers()" id="goobersCost"></button>
            </div>
            <div class="upgrade">
              <p>Cool Goobers! - <span id="coolLevel"></span></p>
              <button onclick="upgradeCool()" id="coolCost"></button>
            </div>
            <div class="upgrade">
              <p>Rebirths (<span id="rebirthValue"></span>x) - <span id="rebirths"></span></p>
              <button onclick="rebirth()" id="rebirthCost"></button>
            </div>
          </div>
        </div>

      </div>

      <div class="goober-skin">
        <h3>Skins</h3>
        <div id="skinsContainer" class="skins-container"></div>
        <div id="skinProgress" class="skin-progress"></div>
      </div>
    </div>

    <audio id="clickSound" src="click.mp3"></audio>
    <audio id="music" src="Assets/Music/BEYOND THE SURFACE.mp3" loop></audio>

    <script>
      // ── DOM refs ──────────────────────────────────────────────────────────────
      const music          = document.getElementById('music');
      const gooberImg      = document.getElementById('gooberImg');
      const pointsEl       = document.getElementById('points');
      const scaleLevelEl   = document.getElementById('scaleLevel');
      const scaleCostEl    = document.getElementById('scaleCost');
      const goobersLevelEl = document.getElementById('goobersLevel');
      const goobersCostEl  = document.getElementById('goobersCost');
      const coolLevelEl    = document.getElementById('coolLevel');
      const coolCostEl     = document.getElementById('coolCost');
      const rebirthValueEl = document.getElementById('rebirthValue');
      const rebirthsEl     = document.getElementById('rebirths');
      const rebirthCostEl  = document.getElementById('rebirthCost');
      const skinsContainer = document.getElementById('skinsContainer');
      const skinProgress   = document.getElementById('skinProgress');

      // ── Constants ─────────────────────────────────────────────────────────────
      const SKIN_CLICK_INTERVAL = 85;

      const skins = [
        { id: 'default',  name: 'Default',  img: 'Assets/Images/goob-default.png' },
        { id: 'square',   name: 'Square',   img: 'Assets/Images/goob-square.png' },
        { id: 'circle',   name: 'Circle',   img: 'Assets/Images/goob-circle.png' },
        { id: 'reprieve', name: 'Reprieve', img: 'Assets/Images/goob-squareREPRIEVE.png' },
        { id: 'hd',       name: 'HD',       img: 'Assets/Images/goob-squareHD.png' },
        { id: 'zen',      name: 'Zen',      img: 'Assets/Images/goob-circleZEN.png' },
        { id: 'alian',    name: 'Alian',    img: 'Assets/Images/goob-alian.png' },
        { id: 'gentle',   name: 'Gentle',   img: 'Assets/Images/goob-gentle.png' },
        { id: 'snap',     name: 'Snap',     img: 'Assets/Images/goob-snap.png' },
        { id: 'doom',     name: 'Doom',     img: 'Assets/Images/goob-doom.png' },
        { id: 'doodle',   name: 'Doodle',   img: 'Assets/Images/goob-doodle.png' },
      ];

      const availableSongs = [
        'Assets/Music/BEYOND THE SURFACE.mp3',
        'Assets/Music/Ultrasonic Faith (Reprise).mp3',
        'Assets/Music/Claire de lune.mp3',
        'Assets/Music/Snowy animal crossing.mp3',
      ];

      const danceGifs = [
        'https://static.wikitide.net/gracewiki/8/8b/GooberStompDance_Soulset.gif',
        'https://static.wikitide.net/gracewiki/b/bd/GooberStandDance_Soulset.gif',
        'https://static.wikitide.net/gracewiki/8/89/GooberRockDance_Soulset.gif',
        'https://static.wikitide.net/gracewiki/4/40/GooberKickDance_Soulset.gif'
      ];

      // ── State ─────────────────────────────────────────────────────────────────
      const state = {
        points:        0,
        rebirths:      0,
        musicStarted:  false,
        totalClicks:   parseInt(localStorage.getItem('totalClicks') || '0', 10),
        equippedSkin:  localStorage.getItem('equippedSkin') || 'default',
        unlockedSkins: new Set(JSON.parse(localStorage.getItem('unlockedSkins') || '["default"]')),
        autoInterval:  null,
        coolInterval:  null,
      };

      // ── Upgrades ──────────────────────────────────────────────────────────────
      const upgrades = {
        rebirth:       { level: 0, cost: 10000, value: 1, increment: 0.25 },
        gooberscaling: { level: 1, cost: 1,     increment: 1 },
        Goobers:       { level: 0, cost: 60,    increment: 1, interval: 1000 },
        coolGoobers:   { level: 0, cost: 100,   increment: 6, interval: 1000 },
      };

      // ── Persistence ───────────────────────────────────────────────────────────
      function saveState() {
        localStorage.setItem('totalClicks',   String(state.totalClicks));
        localStorage.setItem('unlockedSkins', JSON.stringify(Array.from(state.unlockedSkins)));
        localStorage.setItem('equippedSkin',  state.equippedSkin);
      }

      // ── Display ───────────────────────────────────────────────────────────────
      function updateDisplay() {
        pointsEl.textContent       = state.points.toFixed(0);
        scaleLevelEl.textContent   = upgrades.gooberscaling.level;
        scaleCostEl.textContent    = upgrades.gooberscaling.cost;
        goobersLevelEl.textContent = upgrades.Goobers.level;
        goobersCostEl.textContent  = upgrades.Goobers.cost;
        coolLevelEl.textContent    = upgrades.coolGoobers.level;
        coolCostEl.textContent     = upgrades.coolGoobers.cost;
        rebirthValueEl.textContent = upgrades.rebirth.value.toFixed(2);
        rebirthsEl.textContent     = state.rebirths;
        rebirthCostEl.textContent  = upgrades.rebirth.cost;
        renderSkins();
      }

      function multiplier() {
        return upgrades.rebirth.value;
      }

      // ── Music ─────────────────────────────────────────────────────────────────
      function startMusic() {
        if (state.musicStarted) return;
        state.musicStarted = true;
        music.play().catch(() => {});
      }

      function randomizeMusic() {
        const choice = availableSongs[Math.floor(Math.random() * availableSongs.length)];
        music.src = choice;
        music.currentTime = 0;
        music.loop = true;
        music.play().catch(() => {});
        state.musicStarted = true;
      }

      // ── Auto-clicker ─────────────────────────────────────────────────────────
      function restartAuto() {
        clearInterval(state.autoInterval);
        clearInterval(state.coolInterval);

        state.autoInterval = setInterval(() => {
          state.points += upgrades.Goobers.level * upgrades.Goobers.increment * multiplier();
          updateDisplay();
        }, upgrades.Goobers.interval);

        state.coolInterval = setInterval(() => {
          state.points += upgrades.coolGoobers.level * upgrades.coolGoobers.increment * multiplier();
          updateDisplay();
        }, upgrades.coolGoobers.interval);
      }

      // ── Click ─────────────────────────────────────────────────────────────────
      function clickGoober() {
        state.points += upgrades.gooberscaling.level * upgrades.gooberscaling.increment * multiplier();
        startMusic();
        state.totalClicks += 1;
        unlockSkins();
        updateDisplay();
      }

      // ── Upgrades ──────────────────────────────────────────────────────────────
      function upgradeScaling() {
        if (state.points < upgrades.gooberscaling.cost) return;
        state.points -= upgrades.gooberscaling.cost;
        upgrades.gooberscaling.level += 1;
        upgrades.gooberscaling.cost  += 50;
        updateDisplay();
      }

      function upgradeGoobers() {
        if (state.points < upgrades.Goobers.cost) return;
        state.points -= upgrades.Goobers.cost;
        upgrades.Goobers.level += 1;
        upgrades.Goobers.cost  += 5;
        restartAuto();
        updateDisplay();
      }

      function upgradeCool() {
        if (state.points < upgrades.coolGoobers.cost) return;
        state.points -= upgrades.coolGoobers.cost;
        upgrades.coolGoobers.level += 1;
        upgrades.coolGoobers.cost  += 10;
        restartAuto();
        updateDisplay();
      }

      function rebirth() {
        if (state.points < upgrades.rebirth.cost) return;
        state.points  = 0;
        state.rebirths += 1;

        upgrades.rebirth = {
          level:     upgrades.rebirth.level + 1,
          cost:      upgrades.rebirth.cost * 2,
          value:     upgrades.rebirth.value + upgrades.rebirth.increment,
          increment: upgrades.rebirth.increment,
        };
        upgrades.gooberscaling = { level: 1, cost: 1,   increment: 1 };
        upgrades.Goobers       = { level: 0, cost: 60,  increment: 1, interval: 750 };
        upgrades.coolGoobers   = { level: 0, cost: 100, increment: 6, interval: 750 };

        clearInterval(state.autoInterval);
        clearInterval(state.coolInterval);
        state.autoInterval = null;
        state.coolInterval = null;

        updateDisplay();
      }

      // ── Skins ─────────────────────────────────────────────────────────────────
      function setGooberSkin(skin) {
        if (!skin) return;
        gooberImg.src = skin.img;
        state.equippedSkin = skin.id;
        saveState();
        updateDisplay();
      }

      function unlockSkins() {
        const unlockedCount = Math.min(skins.length, Math.floor(state.totalClicks / SKIN_CLICK_INTERVAL) + 1);
        let newUnlock = false;
        for (let i = 0; i < unlockedCount; i++) {
          if (!state.unlockedSkins.has(skins[i].id)) {
            state.unlockedSkins.add(skins[i].id);
            newUnlock = true;
          }
        }
        if (newUnlock) saveState();
      }

      function renderSkins() {
        skinsContainer.innerHTML = '';
        skins.forEach(skin => {
          const unlocked = state.unlockedSkins.has(skin.id);

          const card  = document.createElement('div');
          card.className = 'skin-card';

          const thumb = document.createElement('img');
          thumb.src       = skin.img;
          thumb.alt       = skin.name;
          thumb.className = 'skin-thumb';

          const title = document.createElement('div');
          title.className   = 'skin-title';
          title.textContent = skin.name;

          const btn = document.createElement('button');
          btn.className   = 'skin-btn';
          btn.textContent = unlocked ? (state.equippedSkin === skin.id ? 'Equipped' : 'Equip') : 'Locked';
          btn.disabled    = !unlocked || state.equippedSkin === skin.id;
          btn.addEventListener('click', () => { if (unlocked) setGooberSkin(skin); });

          card.append(thumb, title, btn);
          skinsContainer.appendChild(card);
        });
      }

      // ── Music button ──────────────────────────────────────────────────────────
      const randomizeButton = document.getElementById('randomizeMusicBtn');
      randomizeButton.addEventListener('click', () => {
        randomizeMusic();
        randomizeButton.src = danceGifs[Math.floor(Math.random() * danceGifs.length)];
      });

      // ── Init ──────────────────────────────────────────────────────────────────
      function init() {
        state.unlockedSkins.add('default');
        unlockSkins();
        setGooberSkin(skins.find(s => s.id === state.equippedSkin));
        updateDisplay();
      }

      init();
    </script>
  </div>
</body>

</html>
